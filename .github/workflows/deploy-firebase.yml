name: Deploy Sunny to Firebase Hosting

on:
  push:
    branches: [main, claude/sunny-finance-mvp-HRtWy]
    paths: ['sunny/**', 'firebase.json', '.github/workflows/deploy-firebase.yml']
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sunny/package-lock.json

      - name: Build
        run: npm ci && npm run build
        working-directory: sunny

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: sunny-a2a98
