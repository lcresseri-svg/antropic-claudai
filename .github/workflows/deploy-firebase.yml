name: Deploy Sunny to Firebase Hosting

on:
  push:
    branches: [main, claude/sunny-finance-mvp-HRtWy]
    paths: ['sunny/**', 'firebase.json', '.github/workflows/deploy-firebase.yml']
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sunny/package-lock.json

      - name: Install
        run: npm ci
        working-directory: sunny

      - name: Test
        run: npm test
        working-directory: sunny

      - name: Build
        run: npm run build
        working-directory: sunny
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: sunny-a2a98.web.app
          VITE_FIREBASE_PROJECT_ID: sunny-a2a98
          VITE_FIREBASE_STORAGE_BUCKET: sunny-a2a98.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "1059291331006"
          VITE_FIREBASE_APP_ID: "1:1059291331006:web:f62698cd6f0c6da1caa1ef"
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: sunny-a2a98
