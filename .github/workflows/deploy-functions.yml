name: Deploy Sunny Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'firestore.rules'
      - '.github/workflows/deploy-functions.yml'
  pull_request:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'firestore.rules'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    env:
      # Pin the Firebase CLI major (no surprise cross-major changes from @latest).
      # A full X.Y.Z pin can be set here once a known-good is chosen.
      FIREBASE_TOOLS_VERSION: "13"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # Reproducible install from the committed lockfile.
      - name: Install
        run: npm ci
        working-directory: functions

      - name: Build
        run: npm run build
        working-directory: functions

      # Fail only on HIGH/CRITICAL advisories; moderate/low never block a deploy.
      - name: Security audit (high/critical)
        run: npm audit --audit-level=high
        working-directory: functions

      # Authenticates the Firebase CLI: writes the service-account key and sets
      # GOOGLE_APPLICATION_CREDENTIALS, which firebase-tools picks up automatically.
      # Auth + deploy only on push to main. On pull_request the job builds the
      # functions as a CI check but never authenticates or deploys.
      - id: auth
        if: github.event_name == 'push'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Writes the Gemini key from GitHub Secrets into functions/.env so the
      # deploy bakes it as a runtime environment variable. The file is created
      # fresh in CI, is gitignored, and never committed.
      - name: Write Gemini API key to .env
        if: github.event_name == 'push'
        run: printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY" > functions/.env
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 0) Firestore indexes — required by processRecurringTransactions
      #    (collectionGroup query on `recurring` field needs the composite index).
      #    Idempotent: safe to re-deploy on every push. Retried: the Firebase
      #    Rules/Firestore API occasionally returns a transient 503.
      - name: Deploy Firestore indexes
        if: github.event_name == 'push'
        run: |
          for i in 1 2 3; do
            npx -y firebase-tools@${FIREBASE_TOOLS_VERSION} deploy --only firestore:indexes --project sunny-a2a98 --non-interactive --force && exit 0
            echo "::warning::firestore:indexes deploy attempt $i failed; retrying in 15s"
            sleep 15
          done
          exit 1

      # 0b) Firestore security rules — feedback collection + expenseTokens deny.
      #     Idempotent: safe to re-deploy on every push. Retried: this step has
      #     hit a transient 503 from firebaserules.googleapis.com, which (under
      #     `bash -e`) aborted the whole job and skipped the function deploys.
      - name: Deploy Firestore rules
        if: github.event_name == 'push'
        run: |
          for i in 1 2 3; do
            npx -y firebase-tools@${FIREBASE_TOOLS_VERSION} deploy --only firestore:rules --project sunny-a2a98 --non-interactive --force && exit 0
            echo "::warning::firestore:rules deploy attempt $i failed; retrying in 15s"
            sleep 15
          done
          exit 1

      # Clean up obsolete functions that were removed from source. Because the
      # deploy steps below use `--only functions:<names>`, deleting a function
      # from the code does NOT undeploy it — Cloud Scheduler keeps firing it.
      # `functions:delete` is idempotent here via `|| true` (no-op once gone).
      - name: Delete obsolete functions
        if: github.event_name == 'push'
        run: npx -y firebase-tools@${FIREBASE_TOOLS_VERSION} functions:delete testPush14 --project sunny-a2a98 --region europe-west1 --force || true

      # Deploy in two steps so the simple HTTP functions go live even if the
      # scheduled/trigger functions need a one-time project-IAM grant by an
      # owner (Cloud Scheduler / Pub/Sub / Eventarc service-agent roles).

      # 1) HTTP functions — never need special IAM, deploy first so the AI
      #    digest, the push self-test and the expense-shortcut API are always
      #    available. NB: this list is explicit (--only) — any NEW HTTP function
      #    must be added here or it will never be deployed.
      - name: Deploy HTTP functions
        if: github.event_name == 'push'
        run: npx -y firebase-tools@${FIREBASE_TOOLS_VERSION} deploy --only functions:generateDigest,functions:sendTestPush,functions:generateAffordabilityAdvice,functions:issueExpenseToken,functions:listExpenseTokens,functions:revokeExpenseToken,functions:getExpenseOptions,functions:addExpense,functions:testMetricsRollup --project sunny-a2a98 --non-interactive --force

      # 2) Scheduled + trigger functions — require the service-agent IAM
      #    bindings. If this step fails with an IAM error, an owner must grant
      #    the roles once (see repo notes), then re-run this workflow.
      - name: Deploy scheduled & trigger functions
        if: github.event_name == 'push'
        run: npx -y firebase-tools@${FIREBASE_TOOLS_VERSION} deploy --only functions:processRecurringTransactions,functions:remindLogExpenses,functions:sendMonthlySummary,functions:remindUpcomingPayments,functions:remindInactivity,functions:remindMonthEnd,functions:sendEncouragingInsight,functions:onUserDeleted,functions:onFeedbackCreated,functions:rollupMetrics --project sunny-a2a98 --non-interactive --force
