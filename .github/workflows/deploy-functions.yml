name: Deploy Sunny Cloud Functions

on:
  push:
    branches: [main, claude/sunny-finance-mvp-HRtWy]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install
        working-directory: functions

      - name: Build
        run: npm run build
        working-directory: functions

      # Authenticates the Firebase CLI: writes the service-account key and sets
      # GOOGLE_APPLICATION_CREDENTIALS, which firebase-tools picks up automatically.
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Writes the Gemini key from GitHub Secrets into functions/.env so the
      # deploy bakes it as a runtime environment variable. The file is created
      # fresh in CI, is gitignored, and never committed.
      - name: Write Gemini API key to .env
        run: printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY" > functions/.env
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Delete the old callable function first: Firebase won't let you change
      # a function from callable (onCall) to HTTPS (onRequest) in-place.
      # The delete is best-effort (|| true) so it doesn't fail on first deploy.
      - name: Delete old callable function
        run: npx -y firebase-tools@latest functions:delete generateDigest --region europe-west1 --project sunny-a2a98 --non-interactive --force || true

      # Deploy every function: the AI digest (HTTP), the daily recurring-tx
      # processor, the user-cleanup trigger, and the push reminders (expense
      # nudges + monthly summary).
      - name: Deploy functions
        run: npx -y firebase-tools@latest deploy --only functions --project sunny-a2a98 --non-interactive --force
