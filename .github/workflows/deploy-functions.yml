name: Deploy Sunny Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'firestore.rules'
      - '.github/workflows/deploy-functions.yml'
  pull_request:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'firestore.rules'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install
        run: npm install
        working-directory: functions

      - name: Build
        run: npm run build
        working-directory: functions

      # Authenticates the Firebase CLI: writes the service-account key and sets
      # GOOGLE_APPLICATION_CREDENTIALS, which firebase-tools picks up automatically.
      # Auth + deploy only on push to main. On pull_request the job builds the
      # functions as a CI check but never authenticates or deploys.
      - id: auth
        if: github.event_name == 'push'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Writes the Gemini key from GitHub Secrets into functions/.env so the
      # deploy bakes it as a runtime environment variable. The file is created
      # fresh in CI, is gitignored, and never committed.
      - name: Write Gemini API key to .env
        if: github.event_name == 'push'
        run: printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY" > functions/.env
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 0) Firestore indexes — required by processRecurringTransactions
      #    (collectionGroup query on `recurring` field needs the composite index).
      #    Idempotent: safe to re-deploy on every push.
      - name: Deploy Firestore indexes
        if: github.event_name == 'push'
        run: npx -y firebase-tools@latest deploy --only firestore:indexes --project sunny-a2a98 --non-interactive --force

      # 0b) Firestore security rules — feedback collection needs its create/read
      #     rule live. Idempotent: safe to re-deploy on every push.
      - name: Deploy Firestore rules
        if: github.event_name == 'push'
        run: npx -y firebase-tools@latest deploy --only firestore:rules --project sunny-a2a98 --non-interactive --force

      # Clean up obsolete functions that were removed from source. Because the
      # deploy steps below use `--only functions:<names>`, deleting a function
      # from the code does NOT undeploy it — Cloud Scheduler keeps firing it.
      # `functions:delete` is idempotent here via `|| true` (no-op once gone).
      - name: Delete obsolete functions
        if: github.event_name == 'push'
        run: npx -y firebase-tools@latest functions:delete testPush14 --project sunny-a2a98 --region europe-west1 --force || true

      # Deploy in two steps so the simple HTTP functions go live even if the
      # scheduled/trigger functions need a one-time project-IAM grant by an
      # owner (Cloud Scheduler / Pub/Sub / Eventarc service-agent roles).

      # 1) HTTP functions — never need special IAM, deploy first so the AI
      #    digest and the push self-test are always available.
      - name: Deploy HTTP functions
        if: github.event_name == 'push'
        run: npx -y firebase-tools@latest deploy --only functions:generateDigest,functions:sendTestPush,functions:generateAffordabilityAdvice --project sunny-a2a98 --non-interactive --force

      # 2) Scheduled + trigger functions — require the service-agent IAM
      #    bindings. If this step fails with an IAM error, an owner must grant
      #    the roles once (see repo notes), then re-run this workflow.
      - name: Deploy scheduled & trigger functions
        if: github.event_name == 'push'
        run: npx -y firebase-tools@latest deploy --only functions:processRecurringTransactions,functions:remindLogExpenses,functions:sendMonthlySummary,functions:remindUpcomingPayments,functions:remindInactivity,functions:remindMonthEnd,functions:onUserDeleted,functions:onFeedbackCreated --project sunny-a2a98 --non-interactive --force
