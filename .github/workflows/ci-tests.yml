name: CI tests

# Quality gate on pull requests. Does NOT deploy anything; production deploys
# remain in deploy-firebase.yml / deploy-functions.yml (push to main).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  client-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sunny/package-lock.json
      - run: npm ci
        working-directory: sunny
      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: sunny
      - run: npm test
        working-directory: sunny
      - name: Build frontend
        run: npm run build
        working-directory: sunny

  functions-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
        working-directory: functions
      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: functions
      - run: npm run build
        working-directory: functions
      - name: Security audit (high/critical)
        run: npm audit --audit-level=high
        working-directory: functions

  rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Install rules-test deps
        run: npm install
        working-directory: firestore-tests
      - name: Run Firestore rules tests on the emulator
        run: npx -y firebase-tools@13 emulators:exec --only firestore --project sunny-test "npm --prefix firestore-tests run test"
