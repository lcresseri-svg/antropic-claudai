<!DOCTYPE html>
<html lang="it" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <title>Sunny</title>

    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" media="print" onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0D0D0D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Sunny" />
    <link rel="apple-touch-icon" href="icon.svg" />

    <style>
      html { background: #0D0D0D; }
      #boot {
        position: fixed; inset: 0; display: flex;
        align-items: center; justify-content: center; background: #0D0D0D;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      #boot svg { animation: boot-spin 1.2s linear infinite; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
          <defs>
            <linearGradient id="bg" x1="12" y1="3" x2="12" y2="21" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#F5C842" />
              <stop offset="100%" stop-color="#B8720C" />
            </linearGradient>
          </defs>
          <circle cx="12" cy="12" r="8.5" stroke="url(#bg)" stroke-width="3.2"
            stroke-linecap="round" stroke-dasharray="40.06 13.35" transform="rotate(135 12 12)" />
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
