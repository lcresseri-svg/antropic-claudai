<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="256" y1="56" x2="256" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#B8720C"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Opaque dark background so the saved PWA / home-screen icon always sits on
       a dark surface (iOS composites transparent icons unpredictably otherwise). -->
  <rect x="0" y="0" width="512" height="512" fill="#0D0D0D"/>
  <!-- 270° arc, gap at bottom: r=170, circ≈1068.14, 270°=801.11, 90°gap=267.04 -->
  <circle cx="256" cy="256" r="170"
    fill="none" stroke="url(#g)" stroke-width="60" stroke-linecap="round"
    stroke-dasharray="801.11 267.04"
    transform="rotate(135 256 256)"
    filter="url(#glow)"/>
</svg>
